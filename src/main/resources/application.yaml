spring:
  application:
    name: eventhub-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:15432/eventhub-api-db}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    cache-names: ${CACHE_NAMES:events}
    redis:
      time-to-live: ${CACHE_TTL:10m}
  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT_PER_PHASE:30s}

server:
  shutdown: graceful

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
  structured:
    format:
      console: ${LOG_CONSOLE_FORMAT:logstash}

springdoc:
  swagger-ui:
    path: /swagger-ui.html